<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f9fafb" rx="8"/>
  
  <!-- Card base (light gray) -->
  <rect x="20" y="30" width="160" height="140" fill="#e5e7eb" rx="6" stroke="#d1d5db" stroke-width="2"/>
  
  <!-- Text lines -->
  <line x1="35" y1="50" x2="165" y2="50" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="70" x2="150" y2="70" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="85" x2="155" y2="85" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="100" x2="155" y2="100" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Button -->
  <rect x="35" y="120" width="70" height="30" fill="#3b82f6" rx="4"/>
  <text x="70" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">ACTION</text>
  
  <!-- Red "TEST" Badge (top-right corner) -->
  <circle cx="170" cy="35" r="18" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
  <text x="170" y="42" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">TEST</text>
  
  <!-- Red left border accent -->
  <rect x="20" y="30" width="4" height="140" fill="#dc2626" rx="2"/>
</svg>