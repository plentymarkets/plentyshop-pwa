name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: 0 8 * * *

permissions:
  contents: read
  id-token: write
  pages: write
  packages: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  get-sdk:
    if: github.repository == 'plentymarkets/plentyshop-pwa'
    name: Get SDK documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions/setup
            package.json
            package-lock.json
            packages/api-client
          repository: "plentymarkets/plentymarkets-sdk"
          token: ${{ secrets.PAT_SDK_READ_ONLY }}

      - name: Setup Node
        uses: ./.github/actions/setup

      - name: Build typedoc
        run: npm run publish-typedoc

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdk-docs
          path: ${{ github.workspace }}/docs/reference/

  build:
    if: github.repository == 'plentymarkets/plentyshop-pwa'
    name: Build & publish site
    runs-on: ubuntu-latest
    needs: [get-sdk]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download sdk-docs
        uses: actions/download-artifact@v8
        with:
          name: sdk-docs
          path: ${{ github.workspace }}/docs/reference/

      - name: Setup Node
        uses: ./.github/actions/setup

      - name: Generate API reference
        run: |
          npm run publish-typedoc
          rsync -a --remove-source-files ${{ github.workspace }}/apps/web/docs/reference/composables ${{ github.workspace }}/docs/reference

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with VitePress
        run: |
          npm run docs:build
          touch ${{ github.workspace }}/docs/.vitepress/dist/.nojekyll
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: ${{ github.workspace }}/docs/.vitepress/dist

  deploy:
    if: github.repository == 'plentymarkets/plentyshop-pwa'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
